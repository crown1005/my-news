name: Fetch News

on:
  schedule:
    - cron: '0 23 * * *'  # 毎朝8時（日本時間）= UTC 23時
  workflow_dispatch:        # 手動実行ボタンも使えるようにする

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v3

      - name: Pythonセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: ライブラリをインストール
        run: pip install requests feedparser

      - name: スクリプト実行
        run: python fetch_news.py

      - name: index.htmlをコミット
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "Update newspaper $(date +'%Y-%m-%d')" || echo "変更なし"
          git push
